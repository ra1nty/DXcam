name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  lint-and-type:
    name: Lint and Type Check (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff ty

      - name: Run Ruff
        run: ruff check dxcam

      - name: Run Ty
        run: ty check dxcam

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=68" wheel "Cython==3.1.1" "numpy>=1.26" "opencv-python>=4.13.0.92" pytest

      - name: Install project with Cython extension
        env:
          DXCAM_BUILD_CYTHON: "1"
        run: python -m pip install -e . --no-build-isolation

      - name: Run BGRA conversion parity tests
        run: python -m pytest -q tests/test_bgra_conversion_parity.py

  build-binaries:
    name: Build Binary Wheels and sdist
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel build twine

      - name: Build binary wheels (CPython 3.10-3.14)
        run: python -m cibuildwheel --platform windows --output-dir dist

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Check distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-dist
          path: dist/*
          if-no-files-found: error
