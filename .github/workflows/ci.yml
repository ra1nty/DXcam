name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-type:
    name: Lint and Type Check (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff ty

      - name: Run Ruff
        run: ruff check dxcam

      - name: Run Ty
        run: ty check dxcam
