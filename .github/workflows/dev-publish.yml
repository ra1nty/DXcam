name: Dev Publish

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: dev-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dev-artifacts:
    name: Build Dev Binary Wheels and sdist
    if: github.ref == 'refs/heads/dev'
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_dev: ${{ steps.version.outputs.is_dev }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine cibuildwheel

      - name: Detect package version
        id: version
        shell: python
        run: |
          from pathlib import Path
          import os
          import re

          match = re.search(
              r'^version\s*=\s*"([^"]+)"\s*$',
              Path("pyproject.toml").read_text(encoding="utf-8"),
              flags=re.MULTILINE,
          )
          if match is None:
              raise RuntimeError("Could not find project version in pyproject.toml")
          version = match.group(1)
          is_dev = ".dev" in version
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"is_dev={'true' if is_dev else 'false'}\n")

      - name: Skip for non-dev versions
        if: steps.version.outputs.is_dev != 'true'
        run: |
          echo "Version ${{ steps.version.outputs.version }} is not a dev release."
          echo "Skipping dev publish workflow."

      - name: Verify development version
        if: steps.version.outputs.is_dev == 'true'
        run: python scripts/check_dev_version.py

      - name: Build binary wheels
        if: steps.version.outputs.is_dev == 'true'
        run: python -m cibuildwheel --platform windows --output-dir dist

      - name: Build sdist
        if: steps.version.outputs.is_dev == 'true'
        run: python -m build --sdist --outdir dist

      - name: Check distributions
        if: steps.version.outputs.is_dev == 'true'
        run: python -m twine check --strict dist/*

      - name: Upload build artifacts
        if: steps.version.outputs.is_dev == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dev-dist
          path: dist/*
          if-no-files-found: error

  publish-dev:
    name: Publish Dev Version to PyPI
    if: github.ref == 'refs/heads/dev' && needs.build-dev-artifacts.outputs.is_dev == 'true'
    needs: build-dev-artifacts
    runs-on: ubuntu-latest
    environment:
      name: pypi-dev
      url: https://pypi.org/p/dxcam
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dev-dist
          path: dist/

      - name: Show release artifacts
        run: ls -al dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
