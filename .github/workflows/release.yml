name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    name: Verify Tag and Version Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify tag and package version are in sync
        run: python scripts/check_version_tag.py "${GITHUB_REF_NAME}"

  build-windows-wheel:
    name: Build Wheel (Windows / Python ${{ matrix.python-version }})
    needs: verify-version
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Check wheel metadata
        run: python -m twine check --strict dist/*

      - name: Upload wheel artifact for checks
        uses: actions/upload-artifact@v4
        with:
          name: wheel-check-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build Source Distribution
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Check sdist metadata
        run: python -m twine check --strict dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist-release
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-windows-wheel, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/dxcam
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-check-*
          merge-multiple: true
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist-release
          path: dist/

      - name: Show release artifacts
        run: ls -al dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dxcam
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-check-*
          merge-multiple: true
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist-release
          path: dist/

      - name: Show release artifacts
        run: ls -al dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
