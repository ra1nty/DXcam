name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    name: Verify Tag and Version Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Ensure pip cache directory exists
        run: mkdir -p ~/.cache/pip

      - name: Verify tag and package version are in sync
        run: python scripts/check_version_tag.py "${GITHUB_REF_NAME}"

  build-windows-binaries:
    name: Build Windows Binary Wheels (CPython 3.10-3.14)
    needs: verify-version
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel twine

      - name: Build binary wheels
        run: python -m cibuildwheel --platform windows --output-dir dist

      - name: Check wheel metadata
        run: python -m twine check --strict dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build Source Distribution
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Check sdist metadata
        run: python -m twine check --strict dist/*.tar.gz

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist-release
          path: dist/*.tar.gz
          if-no-files-found: error

  upload-release-assets:
    name: Upload GitHub Release Assets
    needs: [build-windows-binaries, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist-release
          path: dist/

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-windows-binaries, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/dxcam
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist-release
          path: dist/

      - name: Show release artifacts
        run: ls -al dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dxcam
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist-release
          path: dist/

      - name: Show release artifacts
        run: ls -al dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
